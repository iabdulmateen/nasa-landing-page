<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nasa-navbar">
      <div class="nav-left">
        <div class="explore-btn">
          <span>Explore</span>
          <i class="chevron-down"></i>
        </div>
        <div class="search-container">
          <input type="text" placeholder="Search" id="nasa-search" />
        </div>
      </div>

      <div class="nav-center">
        <img
          src="https://www.nasa.gov/wp-content/themes/nasa/assets/images/nasa-logo.svg"
          alt="NASA Logo"
          class="logo"
        />
      </div>

      <div class="nav-right">
        <ul class="nav-links">
          <li>News & Events <i class="chevron-down"></i></li>
          <li>Multimedia <i class="chevron-down"></i></li>
          <li>NASA+ <span class="live-tag">LIVE</span></li>
        </ul>
      </div>

      <div class="mobile-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </nav>
    <script src="script.js"></script>
  </body>
</html>
